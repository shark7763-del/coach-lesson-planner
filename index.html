<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#101828">
<meta name="description" content="CoachPro 是為教練手機操作設計的備課戰情室，可快速產生課表、家長回饋與助教任務。">
<meta name="application-name" content="CoachPro">
<meta name="apple-mobile-web-app-title" content="CoachPro">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="coachpro-logo.png">
<link rel="apple-touch-icon" href="coachpro-logo.png">
<link rel="manifest" href="manifest.webmanifest">
<title>CoachPro</title>
<style>
:root{
  --bg:#f4f6f8; --panel:#ffffff; --ink:#101828; --muted:#667085; --line:#e4e7ec;
  --brand:#d92d20; --brand2:#b42318; --blue:#0b67d1; --green:#12805c; --amber:#b54708;
  --soft-red:#fff1f0; --soft-blue:#eef6ff; --soft-green:#ecfdf3; --soft-amber:#fffaeb;
  --shadow:0 12px 32px rgba(16,24,40,.08); --radius:18px; --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh; max-width:560px; margin:0 auto; padding-bottom:calc(76px + var(--safe-bottom));
  background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  line-height:1.5;
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.appbar{
  position:sticky; top:0; z-index:30; background:rgba(255,255,255,.96); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line); padding:12px 16px; display:flex; align-items:center; gap:10px;
}
.mark{width:42px;height:42px;border-radius:14px;background:#101828;display:grid;place-items:center;overflow:hidden;box-shadow:0 8px 18px rgba(16,24,40,.14);flex:none}
.mark img{width:100%;height:100%;object-fit:cover;display:block}
.appbar h1{font-size:17px;line-height:1.1;margin:0;font-weight:900;letter-spacing:0}
.appbar p{font-size:11px;color:var(--muted);margin:2px 0 0}
.gear{margin-left:auto;width:42px;height:42px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:18px}
.page{padding:16px 16px 24px; animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.hero{
  background:linear-gradient(140deg,#101828,#24324a 58%,#b42318); color:#fff; border-radius:0 0 22px 22px;
  padding:18px 16px 22px; margin:-16px -16px 16px;
}
.hero h2{margin:0 0 6px;font-size:24px;line-height:1.18;font-weight:950;letter-spacing:0}
.hero p{margin:0;color:#d0d5dd;font-size:13px}
.status-row{display:flex;gap:8px;margin-top:14px}
.status-chip{flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:8px}
.status-chip b{display:block;font-size:16px;color:#fff;line-height:1}
.status-chip span{font-size:10px;color:#d0d5dd}
.entry-grid{display:grid;gap:12px}
.entry-card{
  min-height:136px; width:100%; text-align:left; border:1px solid var(--line); background:var(--panel);
  border-radius:20px; padding:18px; box-shadow:var(--shadow); display:flex; gap:14px; align-items:flex-start;
}
.entry-card.primary{border-color:#fecdca;background:linear-gradient(180deg,#fff,#fff7f6)}
.entry-icon{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#101828;color:#fff;font-size:24px;flex:none}
.entry-card.primary .entry-icon{background:var(--brand)}
.entry-card.ai .entry-icon{background:var(--blue)}
.entry-card.hist .entry-icon{background:var(--green)}
.entry-card h3{margin:0 0 6px;font-size:19px;font-weight:950;letter-spacing:0}
.entry-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.entry-card .arrow{margin-left:auto;color:#98a2b3;font-size:22px}
.section-title{display:flex;align-items:center;gap:8px;margin:18px 0 10px;font-size:16px;font-weight:950}
.section-title:after{content:"";height:1px;background:var(--line);flex:1}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.mini-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
.muted{color:var(--muted);font-size:12px}
.field{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:13px 14px;color:var(--ink);font-size:15px}
.field:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(11,103,209,.1)}
textarea.field{min-height:112px;resize:vertical}
.btn{
  min-height:52px; width:100%; border:0; border-radius:16px; padding:13px 15px;
  background:var(--brand); color:#fff; font-weight:900; font-size:15px; box-shadow:0 10px 22px rgba(217,45,32,.22);
}
.btn.dark{background:#101828;box-shadow:0 10px 22px rgba(16,24,40,.18)}
.btn.blue{background:var(--blue);box-shadow:0 10px 22px rgba(11,103,209,.18)}
.btn.green{background:var(--green);box-shadow:0 10px 22px rgba(18,128,92,.18)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.light{background:#f2f4f7;color:#344054;box-shadow:none}
.btn.sm{min-height:42px;border-radius:13px;padding:9px 11px;font-size:13px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-grid{display:grid;gap:8px}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{
  min-height:52px;border:1.5px solid var(--line);border-radius:15px;background:#fff;color:#344054;
  padding:11px 10px;font-weight:850;text-align:center;
}
.choice.selected{background:#101828;color:#fff;border-color:#101828;box-shadow:0 8px 18px rgba(16,24,40,.16)}
.choice.warn{background:var(--soft-amber);border-color:#fedf89;color:#93370d}
.step-shell{padding-bottom:96px}
.step-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.step-head h2{margin:0;font-size:22px;line-height:1.2;font-weight:950}
.progress-pill{background:#101828;color:#fff;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:900;white-space:nowrap}
.bar{height:8px;background:#e4e7ec;border-radius:999px;overflow:hidden;margin-bottom:14px}
.bar span{display:block;height:100%;background:var(--brand);border-radius:999px;transition:.18s;width:0}
.sticky-actions{
  position:fixed;left:50%;bottom:calc(76px + var(--safe-bottom));transform:translateX(-50%);width:100%;max-width:560px;
  background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:10px 16px;z-index:35;
}
.sticky-actions .btn-row{grid-template-columns:112px 1fr}
.tabbar{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:560px;
  background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:40;
  padding-bottom:var(--safe-bottom);box-shadow:0 -8px 24px rgba(16,24,40,.08);
}
.tabbar button{min-height:64px;border:0;background:#fff;color:#667085;font-size:12px;font-weight:850;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.tabbar button span{font-size:22px;line-height:1}
.tabbar button.active{color:var(--brand)}
.alert{border:1px solid #fedf89;background:var(--soft-amber);border-radius:16px;padding:13px;margin-bottom:12px;color:#7a2e0e}
.alert b{display:block;margin-bottom:4px}
.result-top{background:#101828;color:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.result-top h2{margin:0 0 8px;font-size:20px;font-weight:950}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.metric{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px}
.metric span{display:block;font-size:10px;color:#d0d5dd}.metric b{font-size:14px;color:#fff}
.score-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#ecfdf3;color:#067647;padding:7px 10px;font-size:12px;font-weight:950}
.lesson-card summary{list-style:none;display:flex;align-items:center;gap:10px;cursor:pointer}
.lesson-card summary::-webkit-details-marker{display:none}
.time-badge{background:var(--soft-red);color:var(--brand2);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;white-space:nowrap}
.lesson-card h3{margin:0;font-size:16px;font-weight:950;flex:1}
.chev{color:#98a2b3}
details[open] .chev{transform:rotate(90deg)}
.detail-grid{display:grid;gap:8px;margin-top:12px}
.detail{border-radius:13px;padding:10px 11px;background:#f8fafc;font-size:13px;color:#344054}
.detail b{display:block;color:#101828;font-size:12px;margin-bottom:2px}
.detail.assist{background:var(--soft-blue)}.detail.safe{background:var(--soft-amber)}.detail.alt{background:var(--soft-green)}
.action-dock{
  position:sticky;bottom:calc(76px + var(--safe-bottom));z-index:20;background:rgba(244,246,248,.94);
  backdrop-filter:blur(12px);padding:8px 0;margin:10px 0;
}
.copy-row{display:grid;grid-template-columns:1fr 92px;gap:8px;align-items:start}
.copy-row>div{min-width:0}
.copy-box{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px;white-space:pre-wrap;font-size:13px;color:#344054;max-height:180px;overflow:auto}
.list-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 8px 18px rgba(16,24,40,.05)}
.list-card h3{margin:0 0 4px;font-size:16px;font-weight:950}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.tag{background:#f2f4f7;color:#475467;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850}
.tag.red{background:var(--soft-red);color:var(--brand2)}.tag.blue{background:var(--soft-blue);color:#0754a6}.tag.green{background:var(--soft-green);color:#067647}
.empty{text-align:center;color:var(--muted);padding:34px 12px;font-size:13px}
.empty b{display:block;color:#344054;font-size:16px;margin-bottom:4px}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#eaecf0;border-radius:15px;padding:4px;margin-bottom:12px}
.seg button{border:0;border-radius:12px;background:transparent;padding:9px 5px;font-size:12px;font-weight:900;color:#667085}
.seg button.on{background:#fff;color:#101828;box-shadow:0 2px 8px rgba(16,24,40,.08)}
.toast{position:fixed;left:50%;bottom:calc(150px + var(--safe-bottom));transform:translateX(-50%) translateY(8px);z-index:80;background:#101828;color:#fff;border-radius:999px;padding:11px 18px;font-size:13px;font-weight:850;opacity:0;pointer-events:none;transition:.18s}
.toast.show{opacity:1;transform:translateX(-50%)}
.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.58);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:560px;max-height:90vh;overflow:auto;background:#fff;border-radius:22px 22px 0 0;padding:18px}
.modal h2{margin:0 0 12px;font-size:20px;font-weight:950}
.modal label{display:block;margin:10px 0 5px;font-size:12px;font-weight:900;color:#475467}
@media(min-width:520px){.choice-grid{grid-template-columns:repeat(3,1fr)}.entry-grid{grid-template-columns:1fr}.btn-grid.two{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="appbar">
  <div class="mark"><img src="coachpro-logo.png" alt="CoachPro logo"></div>
  <div>
    <h1>CoachPro</h1>
    <p id="appSub">手機快速備課 · 課後可直接複製</p>
  </div>
  <button class="gear" onclick="openSettings()" aria-label="設定">⚙</button>
</header>

<main>
  <section class="page" id="page-plan"></section>
  <section class="page hidden" id="page-material"></section>
  <section class="page hidden" id="page-after"></section>
  <section class="page hidden" id="page-records"></section>
</main>

<nav class="tabbar" aria-label="主要選單">
  <button class="active" data-page="plan" onclick="go('plan')"><span>⚡</span>備課</button>
  <button data-page="material" onclick="go('material')"><span>📚</span>素材</button>
  <button data-page="after" onclick="go('after')"><span>💬</span>課後</button>
  <button data-page="records" onclick="go('records')"><span>🗂</span>紀錄</button>
</nav>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
const LS={materials:'clp_materials',videos:'clp_videos',history:'clp_history',current:'clp_current',seed:'coachpro_seed_v2'};
const $=id=>document.getElementById(id);
const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO=()=>new Date().toISOString();
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

const CLASSES=['幼幼班','基礎班','選手班','品勢班','黑帶班','暑期集訓'];
const AGES=['3-6歲','國小低年級','國小高年級','國中','高中以上'];
const SIZES=['少於8人','8-15人','15-25人','25人以上'];
const PLACES=['大場地','中場地','小場地','下雨室內'];
const GOALS=['專注力','基本踢擊','品勢','對練','體能','禮貌紀律','反應速度','協調性'];
const EQUIP=['踢靶','角錐','敏捷圈','軟墊','跳繩','反應燈','欄架','無器材'];
const QUICK_STEPS=[
  {key:'cls',title:'選擇班級',items:CLASSES},
  {key:'age',title:'選擇年齡',items:AGES},
  {key:'size',title:'選擇人數',items:SIZES},
  {key:'place',title:'選擇場地',items:PLACES},
  {key:'goals',title:'選擇課程目標',items:GOALS,multi:true},
  {key:'equip',title:'選擇器材',items:EQUIP,multi:true}
];
let screen='home', quickStep=0, quick={cls:'',age:'',size:'',place:'',goals:[],equip:[]}, CURRENT=normalizeLesson(read(LS.current,null)), materialTab='lesson', histQuery='';

function normalizeLesson(raw){
  if(!raw)return null;
  if(raw.cls && Array.isArray(raw.blocks) && raw.parent)return raw;
  if(raw.ctx){
    return buildLesson({
      cls:raw.ctx.cls||'基礎班',
      age:raw.ctx.age||'國小低年級',
      size:SIZES.includes(raw.ctx.size)?raw.ctx.size:'8-15人',
      place:raw.ctx.place||'中場地',
      goals:(raw.ctx.goals||['基本踢擊']).map(g=>g==='基本動作'||g==='前踢'?'基本踢擊':g).filter(g=>GOALS.includes(g)),
      equip:(raw.ctx.equip||['踢靶']).map(e=>EQUIP.includes(e)?e:'無器材')
    }, raw.mode||'舊課表轉換');
  }
  return null;
}

function seed(){
  if(read(LS.seed,false))return;
  const materials=[
    {id:uid(),name:'紅綠燈反應衝刺',stage:'暖身',goals:['反應速度','專注力'],equipment:['角錐'],content:'教練喊綠燈前進、紅燈停止、黃燈小碎步，加入方向變化。',coach:'規則先短講，先慢後快，停止時要求身體定住。',assistant:'站終點維持隊伍與安全距離。',safety:'折返區不要太靠牆，避免衝撞。',alt:'小場地改成原地反應步伐。'},
    {id:uid(),name:'基本前踢踢靶',stage:'主課',goals:['基本踢擊'],equipment:['踢靶'],content:'提膝、踢出、收腳、落地四拍分解，最後做連續踢靶。',coach:'先看膝蓋方向，再看腳背擊中位置。',assistant:'持靶調高度，提醒排隊孩子保持距離。',safety:'持靶者站穩，踢擊區一次一人。',alt:'無器材可改踢空氣目標線。'},
    {id:uid(),name:'品勢八拍分解',stage:'主課',goals:['品勢','禮貌紀律'],equipment:['無器材'],content:'每 8 拍停一次，確認站姿、手部路線與視線。',coach:'口令清楚，錯誤先改方向再改細節。',assistant:'站側邊示範，協助後排修正方向。',safety:'手刀與踢腿時保留左右間距。',alt:'年紀小改成鏡像模仿。'},
    {id:uid(),name:'分站循環體能',stage:'主課',goals:['體能','協調性'],equipment:['角錐','敏捷圈','跳繩'],content:'三站各 40 秒：快腳、折返、跳繩，輪轉 3 回合。',coach:'用短回合維持品質，不要只追求累。',assistant:'每站一名助教記分與控安全。',safety:'站與站之間保留通道。',alt:'人數超過 25 人優先使用這種分站。'},
    {id:uid(),name:'靜態伸展與今日回顧',stage:'收操',goals:['禮貌紀律'],equipment:['無器材'],content:'大腿前側、後側、髖部伸展，最後請孩子說出今天一個進步。',coach:'讓心跳降下來，用正向語句收尾。',assistant:'整理器材，協助個別孩子喝水。',safety:'伸展不彈震，不壓迫關節。',alt:'幼兒改成聞花香吹蠟燭呼吸。'}
  ];
  const videos=[
    {id:uid(),title:'兒童跆拳道暖身遊戲搜尋',url:'https://www.youtube.com/results?search_query=%E5%85%92%E7%AB%A5%E8%B7%86%E6%8B%B3%E9%81%93+%E6%9A%96%E8%BA%AB%E9%81%8A%E6%88%B2',goals:['專注力','反應速度']},
    {id:uid(),title:'Taekwondo kids kicking drills',url:'https://www.youtube.com/results?search_query=taekwondo+kids+kicking+drills',goals:['基本踢擊']}
  ];
  const existingMaterials=read(LS.materials,[]);
  const existingVideos=read(LS.videos,[]);
  const names=new Set(existingMaterials.map(x=>x.name));
  const titles=new Set(existingVideos.map(x=>x.title));
  write(LS.materials,[...existingMaterials,...materials.filter(x=>!names.has(x.name))]);
  write(LS.videos,[...existingVideos,...videos.filter(x=>!titles.has(x.title))]);
  write(LS.seed,true);
}

function renderPlan(){
  if(screen==='quick')return renderQuick();
  if(screen==='ai')return renderAI();
  if(screen==='standard')return renderStandard();
  if(screen==='result')return renderResult();
  $('page-plan').innerHTML=`
    <div class="hero">
      <h2>今天上課，先按這裡</h2>
      <p>只保留三個入口。趕時間、特殊狀況、沿用舊課表都能快速開始。</p>
      <div class="status-row">
        <div class="status-chip"><b>${read(LS.history,[]).length}</b><span>歷史課表</span></div>
        <div class="status-chip"><b>${read(LS.materials,[]).length}</b><span>素材</span></div>
        <div class="status-chip"><b>${CURRENT?goScore(CURRENT).score:'-'}</b><span>/go 分數</span></div>
      </div>
    </div>
    <div class="entry-grid">
      <button class="entry-card primary" onclick="startQuick()">
        <span class="entry-icon">⚡</span><span><h3>快速備課</h3><p>趕時間時，選班級、目標、器材後，立即產生今日課表。</p></span><span class="arrow">›</span>
      </button>
      <button class="entry-card ai" onclick="screen='ai';renderPlan()">
        <span class="entry-icon">AI</span><span><h3>AI 智能備課</h3><p>描述下雨、人多、精神太好或器材不足，系統自動安排最適合課表。</p></span><span class="arrow">›</span>
      </button>
      <button class="entry-card hist" onclick="go('records')">
        <span class="entry-icon">↺</span><span><h3>歷史課表微調</h3><p>從過去課表快速沿用，並提供變化版本，避免每次上課都一樣。</p></span><span class="arrow">›</span>
      </button>
    </div>`;
}
function startQuick(){screen='quick';quickStep=0;quick={cls:'',age:'',size:'',place:'',goals:[],equip:[]};renderPlan();window.scrollTo(0,0)}
function renderQuick(){
  const s=QUICK_STEPS[quickStep], val=quick[s.key], pct=((quickStep+1)/QUICK_STEPS.length)*100;
  const dup=quick.cls&&quick.goals.length?duplicateAlert(quick.cls,quick.goals):'';
  $('page-plan').innerHTML=`

function pickQuick(key,item,multi){
  if(multi){
    const arr=quick[key]; const i=arr.indexOf(item);

    if(key==='equip'&&item==='無器材'&&arr.includes('無器材'))quick.equip=['無器材'];
    if(key==='equip'&&item!=='無器材')quick.equip=quick.equip.filter(x=>x!=='無器材');
  }else quick[key]=item;

function duplicateAlert(cls,goals){
  const h=read(LS.history,[]), since=Date.now()-7*864e5;

    const count=h.filter(x=>(x.cls||x.ctx?.cls)===cls && (x.goals||x.ctx?.goals||[]).includes(g) && Date.parse(x.date)>since).length;
    if(count>=2)return `<div class="alert"><b>防重複提醒</b>本班近 7 天已練過 ${count} 次${g}，建議今天加入步伐、反應或品勢變化，避免課程重複。

}

    {time:'45-55分',name:'應用挑戰',focus:'把主課變成可執行任務',content:station?'各站最後一輪加入小隊積分。':'闖關任務：完成指定動作後前進，最後做團隊挑戰。',coach:'用任務感提高投入，但分數不是唯一重點。',assistant:'記錄分數、鼓勵落後組、整理器材。',safe:'闖關動線單向，入口出口分開。',alt:'低器材版改成徒手動作賓果。'},

  lesson.parent=makeParentVersions(lesson);
  return lesson;
}
function goScore(L){
  const checks=[
    L.goals.length>0, L.blocks.some(b=>/暖身/.test(b.name)), L.blocks.some(b=>/主課|踢擊|品勢|對練/.test(b.name)), L.blocks.some(b=>/收操/.test(b.name)),
    !!L.age, !!L.size, !!L.place, L.equip.length>0, L.blocks.every(b=>b.safe), L.blocks.every(b=>b.assistant), !!L.parent
  ];
  let score=Math.min(10,Math.round(checks.filter(Boolean).length/checks.length*10));
  const tips=[];
  if(!L.blocks.some(b=>/收操/.test(b.name)))tips.push('這堂課缺少收操');
  if(L.size==='25人以上')tips.push('人數超過 25 人，建議改成分站循環');
  if(L.equip.includes('無器材'))tips.push('器材不足，建議加入無器材替代方案');
  if(!L.parent)tips.push('缺少家長回饋文字');
  return {score,tips};
}

  }
  if(x.mode==='standard'){
    return buildLesson({cls:'基礎班',age:'國小低年級',size:'8-15人',place:'中場地',goals:['基本踢擊','體能'],equip:['踢靶','角錐']},'標準課表');
  }
  return null;
}

function openMaterialModal(){
  modal(`<h2>新增教案素材</h2><label>名稱</label><input class="field" id="mName"><label>內容</label><textarea class="field" id="mContent"></textarea><button class="btn" onclick="saveMaterialModal()">儲存素材</button><div style="height:8px"></div><button class="btn ghost" onclick="closeModal()">取消</button>`);
}
function editMaterial(id){const m=read(LS.materials,[]).find(x=>x.id===id); if(!m)return; openMaterialModal(); $('mName').value=m.name; $('mContent').value=m.content; $('mName').dataset.id=id}
function saveMaterialModal(){const name=$('mName').value.trim(), content=$('mContent').value.trim(); if(!name)return toast('請輸入名稱'); const items=read(LS.materials,[]); const id=$('mName').dataset.id||uid(); const obj={id,name,content,stage:'自訂',goals:[],equipment:[],coach:'',assistant:'',safety:'',alt:''}; const i=items.findIndex(x=>x.id===id); if(i>=0)items[i]={...items[i],...obj}; else items.unshift(obj); write(LS.materials,items); closeModal(); renderMaterial(); toast('已儲存')}
function openVideoModal(){modal(`<h2>新增教學影片</h2><label>標題</label><input class="field" id="vTitle"><label>連結</label><input class="field" id="vUrl"><button class="btn" onclick="saveVideoModal()">儲存影片</button><div style="height:8px"></div><button class="btn ghost" onclick="closeModal()">取消</button>`)}
function saveVideoModal(){const title=$('vTitle').value.trim(), url=$('vUrl').value.trim(); if(!title||!url)return toast('請填標題與連結'); const v=read(LS.videos,[]); v.unshift({id:uid(),title,url,goals:[]}); write(LS.videos,v); closeModal(); renderMaterial(); toast('已儲存')}

function openSettings(){modal(`<h2>設定</h2><div class="mini-card"><b>資料狀態</b><div class="muted">素材 ${read(LS.materials,[]).length}｜影片 ${read(LS.videos,[]).length}｜歷史 ${read(LS.history,[]).length}</div></div><button class="btn ghost" onclick="exportData()">匯出備份 JSON</button><div style="height:8px"></div><button class="btn ghost" onclick="closeModal()">關閉</button>`)}
function exportData(){const blob=new Blob([JSON.stringify({materials:read(LS.materials,[]),videos:read(LS.videos,[]),history:read(LS.history,[])},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='coachpro-backup.json'; a.click(); URL.revokeObjectURL(a.href)}
function modal(html){$('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){$('modalRoot').innerHTML=''}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1800)}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>toast('已複製')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已複製')})}
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden')); $('page-'+page).classList.remove('hidden');
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  $('appSub').textContent={plan:'備課：快速、AI、標準課表',material:'素材：教案、影片、招式',after:'課後：助教任務、家長回饋、LINE 文字',records:'紀錄：歷史、防重複、沿用'}[page];
  if(page==='plan')renderPlan(); if(page==='material')renderMaterial(); if(page==='after')renderAfter(); if(page==='records')renderRecords();
  window.scrollTo(0,0);
}
seed(); renderPlan();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
</script>
</body>

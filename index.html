<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050B14">
<meta name="description" content="CoachPro 備課戰情室，給跆拳道教練、體適能教練與道館經營者使用的手機備課系統。">

<title>CoachPro</title>
<style>
:root{
  --bg-main:#050B14;
  --bg-card:#0B1624;
  --bg-card-soft:#101C2E;
  --primary:#00D9FF;
  --primary-2:#2F80FF;
  --text-main:#F4F8FF;
  --text-muted:#91A4B8;
  --border-glow:rgba(0,217,255,.24);
  --success:#3EF7A0;
  --warning:#FFB020;
  --danger:#FF4D6D;
  --glass:rgba(11,22,36,.86);
  --shadow:0 12px 30px rgba(0,0,0,.28),0 0 18px rgba(0,217,255,.08);
  --radius:20px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;max-width:560px;margin:0 auto;color:var(--text-main);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  background:
    radial-gradient(circle at 18% 4%,rgba(0,217,255,.20),transparent 26%),
    radial-gradient(circle at 88% 12%,rgba(47,128,255,.18),transparent 30%),
    linear-gradient(135deg,rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(45deg,rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(180deg,#050B14 0%,#07111f 46%,#050B14 100%);
  background-size:auto,auto,34px 34px,34px 34px,auto;
  padding-bottom:calc(78px + var(--safe-bottom));
}
body:before{
  content:"";position:fixed;right:-62px;top:82px;width:220px;height:140px;opacity:.08;pointer-events:none;
  background:linear-gradient(135deg,transparent 34%,var(--primary) 36%,transparent 38%),radial-gradient(ellipse at center,var(--primary),transparent 68%);
  clip-path:polygon(8% 54%,70% 6%,92% 22%,62% 54%,94% 86%,66% 98%);
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.appbar{
  position:sticky;top:0;z-index:35;display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:rgba(5,11,20,.86);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,217,255,.16);
}
.logo{width:46px;height:46px;border-radius:16px;overflow:hidden;box-shadow:0 0 22px rgba(0,217,255,.26);border:1px solid var(--border-glow);flex:none}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
.appbar h1{margin:0;font-size:18px;line-height:1.05;font-weight:950;letter-spacing:0}
.appbar p{margin:3px 0 0;color:var(--text-muted);font-size:11px}
.gear{margin-left:auto;width:44px;height:44px;border-radius:15px;border:1px solid var(--border-glow);background:rgba(16,28,46,.78);color:var(--primary);font-size:18px}
.page{padding:16px 16px 24px;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.hero{padding:18px 0 16px}
.brandline{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.brandline .big-logo{width:70px;height:70px;border-radius:22px;overflow:hidden;border:1px solid var(--border-glow);box-shadow:0 0 32px rgba(0,217,255,.30)}
.big-logo img{width:100%;height:100%;object-fit:cover}
.hero h2{margin:0 0 6px;font-size:26px;line-height:1.15;font-weight:950}
.hero p{margin:0;color:var(--text-muted);font-size:14px}
.speedline{height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent);box-shadow:0 0 14px rgba(0,217,255,.55);margin:12px 0}
.grid{display:grid;gap:12px}
.entry-card,.card,.list-card,.student-card,details.lesson-card{
  position:relative;background:var(--glass);border:1px solid var(--border-glow);box-shadow:var(--shadow);
  border-radius:var(--radius);backdrop-filter:blur(14px);overflow:hidden;
}
.entry-card:before,.card:before,.list-card:before,.student-card:before,details.lesson-card:before{
  content:"";position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:999px;background:linear-gradient(var(--primary),var(--primary-2));box-shadow:0 0 14px var(--primary);
}
.entry-card{width:100%;min-height:132px;text-align:left;color:var(--text-main);padding:18px;border-radius:22px;display:flex;gap:14px;align-items:flex-start}
.entry-card:active,.btn:active,.choice:active{transform:scale(.985)}
.entry-card:hover,.entry-card:focus{box-shadow:0 0 0 1px rgba(0,217,255,.28),0 0 28px rgba(0,217,255,.18)}
.entry-icon{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(0,217,255,.18),rgba(47,128,255,.30));border:1px solid var(--border-glow);color:var(--primary);font-size:24px;flex:none}
.entry-card h3{margin:0 0 6px;font-size:19px;font-weight:950}
.entry-card p{margin:0;color:var(--text-muted);font-size:13px;line-height:1.55}
.entry-card .arrow{margin-left:auto;align-self:flex-end;color:var(--primary);font-size:24px}
.card{padding:16px;margin-bottom:12px}
.section-title{display:flex;align-items:center;gap:10px;margin:18px 0 10px;font-size:17px;font-weight:950}
.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--border-glow),transparent)}
.muted{color:var(--text-muted);font-size:12px}
.field{
  width:100%;min-height:48px;border:1px solid var(--border-glow);border-radius:15px;background:rgba(5,11,20,.58);
  color:var(--text-main);padding:12px 13px;font-size:15px;outline:none;
}
.field:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,217,255,.10)}
textarea.field{min-height:110px;resize:vertical}
.btn{
  min-height:56px;width:100%;border:0;border-radius:16px;padding:13px 15px;font-weight:950;font-size:15px;
  color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 0 20px rgba(0,217,255,.36);
}
.btn.ghost{background:rgba(16,28,46,.72);border:1px solid var(--border-glow);color:var(--primary);box-shadow:none}
.btn.dark{background:#0a1320;color:var(--text-main);border:1px solid rgba(145,164,184,.28);box-shadow:none}
.btn.sm{min-height:44px;border-radius:13px;padding:9px 11px;font-size:13px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-grid{display:grid;gap:8px}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{
  min-height:56px;border:1px solid rgba(145,164,184,.22);border-radius:16px;background:rgba(16,28,46,.76);
  color:var(--text-main);padding:11px 10px;font-weight:900;text-align:center;
}
.choice.selected{border-color:var(--primary);color:#fff;background:linear-gradient(135deg,rgba(0,217,255,.24),rgba(47,128,255,.30));box-shadow:0 0 18px rgba(0,217,255,.20)}
.step-shell{padding-bottom:100px}
.step-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.step-head h2{margin:0;font-size:22px;line-height:1.2;font-weight:950}
.progress-pill{background:rgba(0,217,255,.14);border:1px solid var(--border-glow);color:var(--primary);border-radius:999px;padding:6px 11px;font-size:12px;font-weight:950;white-space:nowrap}
.bar{height:8px;background:rgba(145,164,184,.18);border-radius:999px;overflow:hidden;margin-bottom:14px}
.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));box-shadow:0 0 14px rgba(0,217,255,.6);border-radius:999px}
.sticky-actions{position:fixed;left:50%;bottom:calc(78px + var(--safe-bottom));transform:translateX(-50%);width:100%;max-width:560px;background:rgba(5,11,20,.88);backdrop-filter:blur(16px);border-top:1px solid var(--border-glow);padding:10px 16px;z-index:34}
.sticky-actions .btn-row{grid-template-columns:112px 1fr}
.tabbar{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:40;width:100%;max-width:560px;
  display:grid;grid-template-columns:repeat(5,1fr);background:rgba(5,11,20,.96);border-top:1px solid var(--border-glow);
  padding-bottom:var(--safe-bottom);box-shadow:0 -12px 30px rgba(0,0,0,.34);
}
.tabbar button{position:relative;min-height:68px;border:0;background:transparent;color:var(--text-muted);font-size:11px;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.tabbar button span{font-size:21px;line-height:1}
.tabbar button.active{color:var(--primary);text-shadow:0 0 14px rgba(0,217,255,.55)}
.tabbar button.active:before{content:"";position:absolute;top:0;width:32px;height:3px;border-radius:999px;background:var(--primary);box-shadow:0 0 12px var(--primary)}
.result-top{padding:16px;border-radius:22px;background:linear-gradient(160deg,rgba(11,22,36,.96),rgba(16,28,46,.84));border:1px solid var(--border-glow);box-shadow:var(--shadow);margin-bottom:12px}
.result-top h2{margin:0 0 10px;font-size:21px;font-weight:950}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.metric{background:rgba(5,11,20,.46);border:1px solid rgba(0,217,255,.14);border-radius:15px;padding:10px}
.metric span{display:block;color:var(--text-muted);font-size:10px}.metric b{font-size:14px}
.score-orb{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--border-glow);background:radial-gradient(circle,rgba(0,217,255,.20),rgba(47,128,255,.08));box-shadow:0 0 24px rgba(0,217,255,.22);font-weight:950;color:var(--primary)}
details.lesson-card{padding:0;margin-bottom:12px}
.lesson-card summary{list-style:none;display:flex;align-items:center;gap:10px;cursor:pointer;padding:15px 16px 15px 18px}
.lesson-card summary::-webkit-details-marker{display:none}
.time-badge{background:rgba(0,217,255,.12);border:1px solid var(--border-glow);color:var(--primary);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;white-space:nowrap}
.lesson-card h3{margin:0;font-size:16px;font-weight:950;flex:1}
.chev{color:var(--primary)}details[open] .chev{transform:rotate(90deg)}
.detail-grid{display:grid;gap:8px;padding:0 16px 16px 18px}
.detail{border-radius:14px;padding:10px 11px;background:rgba(5,11,20,.46);border:1px solid rgba(145,164,184,.14);font-size:13px;color:var(--text-muted)}
.detail b{display:block;color:var(--text-main);font-size:12px;margin-bottom:3px}
.detail.assist{border-color:rgba(0,217,255,.22)}.detail.safe{border-color:rgba(255,176,32,.32)}.detail.curr{border-color:rgba(62,247,160,.28)}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:4px 9px;background:rgba(16,28,46,.78);border:1px solid rgba(145,164,184,.18);color:var(--text-muted);font-size:11px;font-weight:900}
.tag.blue{border-color:var(--border-glow);color:var(--primary)}.tag.green{border-color:rgba(62,247,160,.34);color:var(--success)}.tag.warn{border-color:rgba(255,176,32,.36);color:var(--warning)}
.list-card,.student-card{padding:15px;margin-bottom:12px}
.list-card h3,.student-card h3{margin:0 0 5px;font-size:17px;font-weight:950}
.belt-strip{height:6px;border-radius:999px;margin:10px 0;background:linear-gradient(90deg,#fff,#ffd84d,#2f80ff,#ff4d6d,#111)}
.progress{height:9px;border-radius:999px;overflow:hidden;background:rgba(145,164,184,.18);margin:8px 0}
.progress span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--success));box-shadow:0 0 14px rgba(0,217,255,.28)}
.progress.danger span{background:var(--danger)}.progress.warn span{background:var(--warning)}.progress.good span{background:linear-gradient(90deg,var(--primary),var(--success))}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:rgba(5,11,20,.46);border:1px solid rgba(0,217,255,.10);border-radius:16px;padding:4px;margin-bottom:12px}
.seg button{min-height:44px;border:0;border-radius:12px;background:transparent;color:var(--text-muted);font-size:12px;font-weight:950}
.seg button.on{background:rgba(0,217,255,.14);color:var(--primary);box-shadow:0 0 14px rgba(0,217,255,.12)}
.copy-row{display:grid;grid-template-columns:1fr 92px;gap:8px;align-items:start;margin-bottom:10px}.copy-row>div{min-width:0}
.copy-box{background:rgba(5,11,20,.50);border:1px solid rgba(0,217,255,.16);border-radius:14px;padding:12px;white-space:pre-wrap;font-size:13px;color:var(--text-muted);max-height:190px;overflow:auto}
.mini-video{border-top:1px solid rgba(0,217,255,.12);padding-top:10px;margin-top:10px}
.video-thumb{width:100%;aspect-ratio:16/9;border-radius:16px;border:1px solid var(--border-glow);background:linear-gradient(135deg,rgba(0,217,255,.16),rgba(47,128,255,.10));display:grid;place-items:center;overflow:hidden;margin-bottom:10px}
.video-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.video-thumb span{font-size:28px;color:var(--primary);text-shadow:0 0 18px rgba(0,217,255,.6)}
.alert{border:1px solid rgba(255,176,32,.36);background:rgba(255,176,32,.10);border-radius:16px;padding:13px;margin-bottom:12px;color:#ffd28a}.alert b{display:block;color:var(--warning);margin-bottom:4px}
.empty{text-align:center;color:var(--text-muted);padding:34px 12px;font-size:13px}.empty b{display:block;color:var(--text-main);font-size:16px;margin-bottom:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:70;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:560px;max-height:90vh;overflow:auto;background:#07111f;border:1px solid var(--border-glow);border-radius:24px 24px 0 0;padding:18px;color:var(--text-main)}
.modal h2{margin:0 0 12px;font-size:20px;font-weight:950}.modal label{display:block;margin:10px 0 5px;font-size:12px;font-weight:900;color:var(--text-muted)}
.toast{position:fixed;left:50%;bottom:calc(154px + var(--safe-bottom));transform:translateX(-50%) translateY(8px);z-index:90;background:var(--primary);color:#001525;border-radius:999px;padding:11px 18px;font-size:13px;font-weight:950;opacity:0;pointer-events:none;transition:.18s;box-shadow:0 0 20px rgba(0,217,255,.36)}
.toast.show{opacity:1;transform:translateX(-50%)}
@media(min-width:520px){.choice-grid{grid-template-columns:repeat(2,1fr)}.btn-grid.two{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="appbar">
  <div class="logo"><img src="coachpro-logo.png" alt="CoachPro logo"></div>
  <div><h1>CoachPro</h1><p id="appSub">備課：課綱、學生進度與課後回饋</p></div>
  <button class="gear" onclick="openSettings()" aria-label="設定">⚙</button>
</header>

<main>
  <section class="page" id="page-plan"></section>
  <section class="page hidden" id="page-curriculum"></section>
  <section class="page hidden" id="page-students"></section>
  <section class="page hidden" id="page-after"></section>
  <section class="page hidden" id="page-records"></section>
</main>

<nav class="tabbar" aria-label="主要選單">
  <button class="active" data-page="plan" onclick="go('plan')"><span>⚡</span>備課</button>
  <button data-page="curriculum" onclick="go('curriculum')"><span>▤</span>素材</button>
  <button data-page="students" onclick="go('students')"><span>◉</span>學生</button>
  <button data-page="after" onclick="go('after')"><span>✦</span>課後</button>
  <button data-page="records" onclick="go('records')"><span>▣</span>紀錄</button>
</nav>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEYS={curriculum:'coachpro_curriculum_v1',students:'coachpro_students_v1',lessonPlans:'lessonPlans',current:'coachpro_current_v2',fitness:'coachpro_fitness_v1',videos:'coachpro_videos_v1'};
function saveData(key,value){localStorage.setItem(key,JSON.stringify(value))}
function loadData(key,fallback){try{return JSON.parse(localStorage.getItem(key))??fallback}catch(e){return fallback}}
function removeData(key){localStorage.removeItem(key)}
function exportJson(){
  const data={version:2,exportedAt:new Date().toISOString(),curriculum:loadData(STORAGE_KEYS.curriculum,[]),students:loadData(STORAGE_KEYS.students,[]),lessonPlans:loadData(STORAGE_KEYS.lessonPlans,[]),fitness:loadData(STORAGE_KEYS.fitness,[]),videos:loadData(STORAGE_KEYS.videos,[])};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='coachpro-data.json';a.click();URL.revokeObjectURL(a.href);
}
function importJson(file){
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.curriculum)saveData(STORAGE_KEYS.curriculum,d.curriculum);if(d.students)saveData(STORAGE_KEYS.students,d.students);if(d.lessonPlans)saveData(STORAGE_KEYS.lessonPlans,d.lessonPlans);if(d.fitness)saveData(STORAGE_KEYS.fitness,d.fitness);if(d.videos)saveData(STORAGE_KEYS.videos,d.videos);toast('已匯入資料');closeModal();refresh()}catch(err){toast('匯入失敗')}};r.readAsText(file);
}
const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const todayISO=()=>new Date().toISOString();
const CLASSES=['幼幼班','基礎班','選手班','品勢班','黑帶班','暑期集訓'];
const BELTS=['0級白帶','八級黃帶','七級黃藍帶','六級藍帶','五級藍紅帶','四級紅帶','三級紅黑一線','二級紅黑二線','一級紅帶黑頭','晉段準備'];
const AGES=['3-6歲','國小低年級','國小高年級','國中','高中以上'];
const SIZES=['少於8人','8-15人','15-25人','25人以上'];
const PLACES=['大場地','中場地','小場地','下雨室內'];
const GOALS=['基本動作','基本腿法','踢靶應用','品勢段落','對練步伐','防守反擊','黑帶檢定','比賽備戰','幼兒協調','禮貌紀律','體能強化'];
const EQUIP=['踢靶','角錐','敏捷圈','軟墊','跳繩','反應燈','欄架','無器材'];
const VIDEO_CATEGORIES=['基本腿法','品勢教學','對練應用','體能訓練','幼兒課程','助教示範'];
const videoSeed=[
  {id:'vid-basic-kick',title:'基本腿法踢靶搜尋',category:'基本腿法',beltLevel:'八級黃帶',classType:'基礎班',goal:'前踢、旋踢、踢靶',equipment:'踢靶',videoUrl:'https://www.youtube.com/results?search_query=taekwondo+kids+front+kick+roundhouse+pad+drill',thumbnailUrl:'',keyPoints:'抬膝、轉髖、收腳、踢靶距離',coachNotes:'適合放在主課前讓教練抓示範重點。',safetyNotes:'一次一人進入踢擊區，持靶者站穩。',favorite:true,createdAt:todayISO()},
  {id:'vid-poomsae',title:'太極一章教學搜尋',category:'品勢教學',beltLevel:'八級黃帶',classType:'品勢班',goal:'品勢段落、太極一章',equipment:'無器材',videoUrl:'https://www.youtube.com/results?search_query=taegeuk+1+taekwondo+poomsae+tutorial',thumbnailUrl:'',keyPoints:'方向、站姿、視線、八拍節奏',coachNotes:'適合課綱複習雷達使用。',safetyNotes:'手刀與踢腿保持左右間距。',favorite:false,createdAt:todayISO()},
  {id:'vid-fitness',title:'兒童敏捷反應訓練搜尋',category:'體能訓練',beltLevel:'0級白帶',classType:'幼幼班',goal:'幼兒協調、反應、敏捷',equipment:'角錐、敏捷圈',videoUrl:'https://www.youtube.com/results?search_query=kids+agility+reaction+games+cones',thumbnailUrl:'',keyPoints:'短回合、低碰撞、規則簡單',coachNotes:'可改成闖關或接力。',safetyNotes:'轉彎處放慢，不推擠。',favorite:true,createdAt:todayISO()}

function recommendedVideos(block){
  const text=[block.name,block.content,block.curriculumItem].join(' ');
  const terms=text.split(/[、，\s]/).filter(Boolean);
  return videos().map(v=>{
    const hay=[v.title,v.category,v.goal,v.keyPoints,v.coachNotes].join(' ');
    let score=0;
    if(/踢|旋|下壓|側|前拍|靶/.test(text)&&v.category==='基本腿法')score+=5;
    if(/品勢|太極|型/.test(text)&&v.category==='品勢教學')score+=5;
    if(/對練|反擊|護具/.test(text)&&v.category==='對練應用')score+=5;
    if(/體能|敏捷|反應|收操|暖身/.test(text)&&v.category==='體能訓練')score+=4;
    terms.forEach(t=>{if(t.length>1&&hay.includes(t))score+=1});
    return {v,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,2).map(x=>x.v);
}
function recommendedVideoHtml(block,idx){
  const rec=recommendedVideos(block), added=(block.videoIds||[]).map(id=>videos().find(v=>v.id===id)).filter(Boolean);
  const list=[...added,...rec.filter(v=>!added.some(a=>a.id===v.id))].slice(0,3);
  if(!list.length)return `<div class="detail"><b>參考教學影片</b>尚無推薦影片，可到素材分頁新增。</div>`;
  return `<div class="detail curr"><b>參考教學影片</b>${list.map(v=>`<div class="mini-video"><span class="tag blue">${v.category}</span><b>${esc(v.title)}</b><div class="btn-row" style="margin-top:8px"><a class="btn sm ghost" href="${esc(v.videoUrl)}" target="_blank" rel="noopener" style="text-align:center;text-decoration:none">查看影片</a><button class="btn sm ghost" onclick="addVideoToLesson(${idx},'${v.id}')">加入今日課表</button></div></div>`).join('')}</div>`;
}
function addVideoToLesson(blockIndex,videoId){
  const b=CURRENT?.blocks?.[blockIndex]; if(!b)return;
  b.videoIds=b.videoIds||[];
  if(!b.videoIds.includes(videoId))b.videoIds.push(videoId);
  persistLesson(); renderResult(); toast('已加入今日課表');
}

function readiness(s){
  const c=curFor(s.beltLevel), items=itemsFor(c), completed=s.completedItems||[], tests=(c.testItems||'').split(/[、,，]/).filter(Boolean), lessonTarget=typeof c.suggestedLessons==='number'?c.suggestedLessons:72;
  const lessonPct=Math.min(100,(+s.totalLessons||0)/lessonTarget*100), curriculumPct=items.length?completed.filter(i=>items.includes(i)).length/items.length*100:0, testPct=tests.length?completed.filter(i=>tests.some(t=>i.includes(t)||t.includes(i))).length/tests.length*100:100, stability=+(s.stabilityScore||80);
  const score=Math.round(lessonPct*.3+curriculumPct*.4+testPct*.2+stability*.1), missing=[...tests,...items].find(i=>!completed.includes(i)&&!(s.weakItems||[]).includes(i))||((s.weakItems||[])[0]||'');
  return {score,lessonPct,curriculumPct,testPct,missing,status:score<60?'尚需累積':score<80?'接近準備':'可準備晉級'};
}

function closeModal(){$('modalRoot').innerHTML=''}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1800)}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>toast('已複製')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已複製')})}
function go(page){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));$('page-'+page).classList.remove('hidden');document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('appSub').textContent={plan:'備課：快速、AI、歷史微調與 /go',curriculum:'素材：教案、影片、動作、體能遊戲',students:'學生：進度、檢核與晉級準備度',after:'課後：助教任務、LINE 回饋、晉級提醒',records:'紀錄：歷史、防重複、防漏教'}[page];if(page==='plan')renderPlan();if(page==='curriculum')renderCurriculum();if(page==='students')renderStudents();if(page==='after')renderAfter();if(page==='records')renderRecords();scrollTo(0,0)}
ensureData();renderPlan();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
</script>
</body>
</html>
